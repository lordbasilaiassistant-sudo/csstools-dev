  <main>
    <h1>CSS Gradient Generator</h1>
<p class="tagline">Pick colors and angle, get instant CSS gradient code</p>
<div class="card">
  
<div class="row">
  <div>
    <label for="grad-color1">Color 1</label>
    <input type="color" id="grad-color1" value="#6C63FF" oninput="updateGradient()">
  </div>
  <div>
    <label for="grad-color2">Color 2</label>
    <input type="color" id="grad-color2" value="#FF6584" oninput="updateGradient()">
  </div>
  <div>
    <label for="grad-angle">Angle (<span id="angle-val">135</span>&deg;)</label>
    <input type="range" id="grad-angle" min="0" max="360" value="135" oninput="document.getElementById('angle-val').textContent=this.value;updateGradient()">
  </div>
</div>
<label for="grad-type">Gradient Type</label>
<select id="grad-type" onchange="updateGradient()">
  <option value="linear">Linear</option>
  <option value="radial">Radial</option>
</select>
<div id="grad-preview" style="width:100%;height:180px;border-radius:12px;margin:1rem 0;border:1px solid var(--clr-text-muted);"></div>
<div class="controls">
  <button onclick="navigator.clipboard.writeText(document.getElementById('grad-output').textContent)">Copy CSS</button>
</div>
<div class="output-area" id="grad-output" style="font-family:monospace;"></div>
<script>
function updateGradient(){
  const c1=document.getElementById('grad-color1').value;
  const c2=document.getElementById('grad-color2').value;
  const angle=document.getElementById('grad-angle').value;
  const type=document.getElementById('grad-type').value;
  let css;
  if(type==='linear'){css='linear-gradient('+angle+'deg, '+c1+', '+c2+')';}
  else{css='radial-gradient(circle, '+c1+', '+c2+')';}
  document.getElementById('grad-preview').style.background=css;
  document.getElementById('grad-output').textContent='background: '+css+';';
}
updateGradient();
</script>
