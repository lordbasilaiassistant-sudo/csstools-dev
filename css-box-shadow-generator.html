  <main>
    <h1>CSS Box Shadow Generator</h1>
<p class="tagline">Visually design box shadows and export CSS</p>
<div class="card">
  
<div class="row">
  <div>
    <label>Horizontal: <span id="sh-h-val">5</span>px</label>
    <input type="range" id="sh-h" min="-50" max="50" value="5" oninput="document.getElementById('sh-h-val').textContent=this.value;updateShadow()">
  </div>
  <div>
    <label>Vertical: <span id="sh-v-val">5</span>px</label>
    <input type="range" id="sh-v" min="-50" max="50" value="5" oninput="document.getElementById('sh-v-val').textContent=this.value;updateShadow()">
  </div>
</div>
<div class="row">
  <div>
    <label>Blur: <span id="sh-b-val">15</span>px</label>
    <input type="range" id="sh-b" min="0" max="100" value="15" oninput="document.getElementById('sh-b-val').textContent=this.value;updateShadow()">
  </div>
  <div>
    <label>Spread: <span id="sh-s-val">0</span>px</label>
    <input type="range" id="sh-s" min="-50" max="50" value="0" oninput="document.getElementById('sh-s-val').textContent=this.value;updateShadow()">
  </div>
</div>
<div class="row">
  <div>
    <label>Color</label>
    <input type="color" id="sh-color" value="#000000" oninput="updateShadow()">
  </div>
  <div>
    <label>Opacity: <span id="sh-o-val">30</span>%</label>
    <input type="range" id="sh-o" min="0" max="100" value="30" oninput="document.getElementById('sh-o-val').textContent=this.value;updateShadow()">
  </div>
  <div>
    <label style="display:inline-flex;align-items:center;gap:0.5rem;"><input type="checkbox" id="sh-inset" onchange="updateShadow()"> Inset</label>
  </div>
</div>
<div style="display:flex;justify-content:center;padding:3rem;margin:1rem 0;">
  <div id="sh-preview" style="width:200px;height:200px;background:var(--clr-bg-card);border-radius:12px;"></div>
</div>
<div class="controls">
  <button onclick="navigator.clipboard.writeText(document.getElementById('sh-output').textContent)">Copy CSS</button>
</div>
<div class="output-area" id="sh-output" style="font-family:monospace;"></div>
<script>
function updateShadow(){
  const h=document.getElementById('sh-h').value;
  const v=document.getElementById('sh-v').value;
  const b=document.getElementById('sh-b').value;
  const s=document.getElementById('sh-s').value;
  const hex=document.getElementById('sh-color').value;
  const o=document.getElementById('sh-o').value/100;
  const inset=document.getElementById('sh-inset').checked?'inset ':'';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),bl=parseInt(hex.slice(5,7),16);
  const css=inset+h+'px '+v+'px '+b+'px '+s+'px rgba('+r+','+g+','+bl+','+o+')';
  document.getElementById('sh-preview').style.boxShadow=css;
  document.getElementById('sh-output').textContent='box-shadow: '+css+';';
}
updateShadow();
</script>
</div>
